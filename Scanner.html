<!DOCTYPE html>
<html lang="id">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemindai Barcode & QR</title>

    <!-- Library Scanner & CSS Framework -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Menghilangkan link bawaan library scanner */
        #reader a {
            display: none !important;
        }

        #reader {
            border: none !important;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #reader video {
            object-fit: cover;
        }
    </style>
</head>

<body class="p-4 sm:p-6 text-gray-800">

    <div class="max-w-md mx-auto w-full flex flex-col h-full">

        <div class="text-center mb-4">
            <h2 class="text-xl font-bold text-gray-800">Pemindai Log Gudang</h2>
            <p class="text-sm text-gray-500">Scan barcode untuk mencatat log otomatis ke database</p>
        </div>

        <!-- Area Kamera Scanner -->
        <div id="reader" class="w-full min-h-[300px] relative"></div>

        <!-- Kotak Status -->
        <div id="status-container"
            class="mt-6 p-4 rounded-xl text-center font-medium transition-all duration-300 bg-gray-100 text-gray-600 border border-gray-200 shadow-sm">
            <span id="status-text">Menunggu pemindaian...</span>
        </div>

        <div class="mt-auto pt-6 text-center">
            <button onclick="google.script.host.close()"
                class="text-sm font-semibold text-gray-500 hover:text-red-500 transition px-4 py-2 rounded-lg hover:bg-red-50">
                Tutup Jendela
            </button>
        </div>
    </div>

    <script>
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');

        // Suara Beep untuk notifikasi sukses
        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.frequency.value = 850;
                osc.start();
                setTimeout(() => osc.stop(), 150);
            } catch (e) { }
        };

        const updateStatus = (message, state) => {
            statusText.innerText = message;
            statusContainer.className = 'mt-6 p-4 rounded-xl text-center font-medium transition-all duration-300 shadow-sm border ';

            if (state === 'processing') {
                statusContainer.className += 'bg-blue-50 text-blue-700 border-blue-200';
            } else if (state === 'success') {
                statusContainer.className += 'bg-green-50 text-green-700 border-green-200';
            } else if (state === 'error') {
                statusContainer.className += 'bg-red-50 text-red-700 border-red-200';
            } else {
                statusContainer.className += 'bg-gray-100 text-gray-600 border-gray-200';
            }
        };

        function onScanSuccess(decodedText, decodedResult) {
            // 1. Hentikan scanner sementara agar tidak scan beruntun
            html5QrcodeScanner.pause(true);
            playBeep();
            updateStatus(`Memproses: ${decodedText}...`, 'processing');

            // 2. Kirim data ke backend (Code.gs -> saveData)
            google.script.run
                .withSuccessHandler((response) => {
                    updateStatus(response, 'success');
                    // Resume scanner setelah 2.5 detik
                    setTimeout(() => {
                        updateStatus('Menunggu pemindaian...', 'idle');
                        html5QrcodeScanner.resume();
                    }, 2500);
                })
                .withFailureHandler((error) => {
                    updateStatus(`Gagal: ${error}`, 'error');
                    setTimeout(() => {
                        updateStatus('Menunggu pemindaian...', 'idle');
                        html5QrcodeScanner.resume();
                    }, 3000);
                })
                .saveData(decodedText);
        }

        function onScanFailure(error) {
            // Abaikan error per frame (normal terjadi saat kamera mencari fokus)
        }

        // Inisialisasi Scanner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            {
                fps: 15,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                rememberLastUsedCamera: true,
                showTorchButtonIfSupported: true
            },
            false
        );

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>

</html>
